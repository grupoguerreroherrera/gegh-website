<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Elite Web</title>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0f0f0f;
  color: white;
  overflow-x: hidden;
}

/* Cursor */
.cursor {
  width: 20px;
  height: 20px;
  border: 2px solid white;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 9999;
}

/* Hero */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px;
  background: radial-gradient(circle at center, #1a1a1a, #0f0f0f);
}

.title {
  font-size: 4rem;
}

.subtitle {
  font-size: 1.5rem;
}

/* Secciones */
.section {
  padding: 100px;
  opacity: 0;
  transform: translateY(50px);
}
</style>

</head>
<body>

<div class="cursor"></div>

<section class="hero">
  <h1 class="title">Transformamos tu negocio con IA</h1>
  <p class="subtitle">Soluciones inteligentes que escalan</p>
</section>

<section class="section fade-up">
  <h2>Servicios</h2>
  <p>Automatización, IA, desarrollo...</p>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

// Cursor
const cursor = document.querySelector(".cursor");
document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

// Animación hero
gsap.from(".title", {
  opacity: 0,
  y: 100,
  duration: 1.2,
  ease: "power3.out"
});

gsap.from(".subtitle", {
  opacity: 0,
  y: 80,
  duration: 1.2,
  delay: 0.2,
  ease: "power3.out"
});

// Scroll animaciones
gsap.utils.toArray(".fade-up").forEach((el) => {
  gsap.to(el, {
    scrollTrigger: {
      trigger: el,
      start: "top 80%",
    },
    opacity: 1,
    y: 0,
    duration: 1
  });
});

// Parallax
gsap.to(".hero", {
  backgroundPosition: "50% 60%",
  ease: "none",
  scrollTrigger: {
    trigger: ".hero",
    scrub: true
  }
});
</script>

</body>
</html>
